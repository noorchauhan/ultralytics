# YOLO11 Stereo 3D Detection with group-conv stem + stereo cost volume
# The cost volume taps features from backbone layer 1 (groups=2, stride 4),
# builds dot-product correlation at 24 disparity offsets (0..48 feature pixels),
# and is passed ONLY to depth branches (lr_distance, depth) in the head,
# keeping P3/P4/P5 clean for 2D detection to avoid 2D-3D task conflict.
# Usage: model=yolo11n-stereo3ddet-costvol.yaml

# Parameters
nc: 3
stereo: true
input_channels: 6
scales:
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

training:
  loss_weights:
    lr_distance: 2.0
    depth: 1.0
    dimensions: 1.0
    orientation: 1.0

mean_dims:
  Car: [3.88, 1.63, 1.53]
  Pedestrian: [0.88, 0.60, 1.73]
  Cyclist: [1.72, 0.60, 1.77]

# YOLO11 backbone -- group-conv stem (groups=2 for layers 0-1)
backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv, [64, 3, 2, None, 2]]  # 0-P1/2  groups=2: left/right independent
  - [-1, 1, Conv, [128, 3, 2, None, 2]] # 1-P2/4  groups=2: left/right independent
  - [-1, 2, C3k2, [256, False, 0.25]]   # 2       L/R features merge here
  - [-1, 1, Conv, [256, 3, 2]]          # 3-P3/8
  - [-1, 2, C3k2, [512, False, 0.25]]
  - [-1, 1, Conv, [512, 3, 2]]          # 5-P4/16
  - [-1, 2, C3k2, [512, True]]
  - [-1, 1, Conv, [1024, 3, 2]]         # 7-P5/32
  - [-1, 2, C3k2, [1024, True]]
  - [-1, 1, SPPF, [1024, 5]]            # 9
  - [-1, 2, C2PSA, [1024]]              # 10

# YOLO11 head — cost volume bypasses P3, goes only to depth branches
head:
  # Top-down FPN
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 6], 1, Concat, [1]]
  - [-1, 2, C3k2, [512, False]]         # 13
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 4], 1, Concat, [1]]
  - [-1, 2, C3k2, [256, False]]         # 16 (P3/8, clean — no cost vol)

  # Stereo cost volume (separate, NOT merged into P3)
  - [1, 1, StereoCostVolume, [64, 48, 24]]  # 17: [B, 64, H/8, W/8]

  # Bottom-up PAN from clean P3
  - [16, 1, Conv, [256, 3, 2]]
  - [[-1, 13], 1, Concat, [1]]
  - [-1, 2, C3k2, [512, False]]         # 20 (P4/16)
  - [-1, 1, Conv, [512, 3, 2]]
  - [[-1, 10], 1, Concat, [1]]
  - [-1, 2, C3k2, [1024, True]]         # 23 (P5/32)

  # Head: [P3, P4, P5, cost_vol] — cost vol only feeds depth branches
  - [[16, 20, 23, 17], 1, Stereo3DDetHeadYOLO11, [nc]]
