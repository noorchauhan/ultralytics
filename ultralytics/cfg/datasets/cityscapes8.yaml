# Cityscapes8 mini semantic segmentation dataset (8 images) for quick-start testing
# Documentation: https://docs.ultralytics.com/datasets/semantic/cityscapes8

# Dataset root directory
path: cityscapes8
train: images/train
val: images/val

# Semantic mask directory (PNG files, pixel values = class IDs, 255 = ignore/void)
masks_dir: masks

# Cityscapes 19-class labels
names:
  0: road
  1: sidewalk
  2: building
  3: wall
  4: fence
  5: pole
  6: traffic light
  7: traffic sign
  8: vegetation
  9: terrain
  10: sky
  11: person
  12: rider
  13: car
  14: truck
  15: bus
  16: train
  17: motorcycle
  18: bicycle
